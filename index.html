<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fledgewright</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
<style>
  :root{ --night:#0F1E15; --paper:#EAE4CC; --gold:#C8972F; --muted:#b9b39c; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--night); color:var(--paper);
    font-family:"Newsreader",Georgia,serif;
    display:grid; place-items:center; min-height:100vh; text-align:center; padding:24px;
  }
  .mark{ font-size:clamp(28px,6vw,44px); font-weight:500; letter-spacing:.01em; }
  .rule{ width:48px; height:2px; background:var(--gold); margin:20px auto; opacity:.85; }
  .note{ font-size:14px; color:var(--muted); letter-spacing:.02em; font-family:system-ui,sans-serif; }
</style>
</head>
<body>
  <main>
    <div class="mark">Fledgewright</div>
    <div class="rule"></div>
    <div class="note">Site in progress.</div>
  </main>
</body>
</html>
